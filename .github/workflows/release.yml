name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :patches:buildAndroid :patches:generatePatchesList

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v1.0.${{ github.run_number }}"
          MPP=$(ls patches/build/libs/*.mpp | grep -v -- '-sources.mpp' | grep -v -- '-javadoc.mpp' | head -n1)
          echo "Releasing: $MPP and patches-list.json"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release from commit ${{ github.sha }}" \
            "$MPP" \
            patches-list.json
